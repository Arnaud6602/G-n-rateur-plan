<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Générateur Plan Domotique Tuya — Modes Intelligents</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f6fb;
  margin:0;
  padding:15px;
}
h1,h2{color:#1e3c72;margin:5px 0;}
.card{
  background:white;
  border-radius:12px;
  padding:15px;
  margin:15px 0;
  box-shadow:0 3px 8px rgba(0,0,0,0.1);
}
.piece{
  display:grid;
  grid-template-columns: 1fr 80px 80px;
  gap:10px;
  margin-bottom:10px;
}
input{
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:16px;
}
button{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#1e3c72;
  color:white;
  font-size:16px;
  margin-top:10px;
}
pre{
  background:#111;
  color:#0f0;
  padding:15px;
  border-radius:12px;
  overflow:auto;
  font-size:14px;
  white-space:pre-wrap;
}
</style>
</head>
<body>

<h1>🏠 Générateur Plan Domotique Tuya — Modes Pro</h1>

<div class="card">
<h2>1️⃣ Configuration de la maison</h2>

<div id="pieces"></div>

<button onclick="addPiece()">➕ Ajouter une pièce</button>
<button onclick="generate()">⚙️ Générer le plan domotique</button>
</div>

<div class="card">
<h2>📋 Plan généré (clé en main)</h2>
<pre id="result"></pre>
</div>

<script>
let count=0;

function addPiece(){
  count++;
  const div=document.createElement("div");
  div.className="piece";
  div.innerHTML=`
    <input placeholder="Nom de la pièce (ex: Cuisine)" id="name${count}">
    <input type="number" placeholder="Volets" id="v${count}" min="0">
    <input type="number" placeholder="Baies" id="b${count}" min="0">
  `;
  document.getElementById("pieces").appendChild(div);
}

function generate(){
  let txt="";
  let openAll=[], closeAll=[];
  let voletsCount={}, baiesCount={};

  txt+="STRUCTURE DOMOTIQUE PROFESSIONNELLE\n";
  txt+="====================================\n\n";

  for(let i=1;i<=count;i++){
    const name=document.getElementById("name"+i).value.trim() || "Piece"+i;
    const initial=name[0].toUpperCase();
    const v=parseInt(document.getElementById("v"+i).value)||0;
    const b=parseInt(document.getElementById("b"+i).value)||0;

    voletsCount[initial]=voletsCount[initial]||1;
    baiesCount[initial]=baiesCount[initial]||1;

    for(let j=1;j<=v;j++){
      const o=`O${initial}${voletsCount[initial]}`;
      const f=`F${initial}${voletsCount[initial]}`;
      txt+=`${o} → Ouvrir ${name} volet ${j}\n`;
      txt+=`${f} → Fermer ${name} volet ${j}\n`;
      openAll.push(o);
      closeAll.push(f);
      voletsCount[initial]++;
    }

    for(let k=1;k<=b;k++){
      const ob=`OBV${baiesCount[initial]}`;
      const fb=`FBV${baiesCount[initial]}`;
      txt+=`${ob} → Ouvrir ${name} baie ${k}\n`;
      txt+=`${fb} → Fermer ${name} baie ${k}\n`;
      openAll.push(ob);
      closeAll.push(fb);
      baiesCount[initial]++;
    }

    txt+="\n";
  }

  txt+="====================================\n\n";
  txt+="ARCHITECTURE DES MODES\n\n";

  txt+="MODE 1 — MANUEL\n";
  txt+="→ Aucune automatisation active\n";
  txt+="→ Commande uniquement par boutons\n\n";

  txt+="MODE 2 — SEMAINE (Lundi → Vendredi)\n";
  txt+="→ Lever du soleil → Ouverture\n";
  txt+="→ Coucher du soleil → Fermeture\n\n";

  txt+="MODE 3 — WEEK-END (Samedi & Dimanche)\n";
  txt+="→ Ouverture plus tardive\n";
  txt+="→ Fermeture normale\n\n";

  txt+="MODE 4 — VACANCES\n";
  txt+="→ Heures fixes programmées\n";
  txt+="→ Variation aléatoire ±15 min\n\n";

  txt+="MODE 5 — TOUT OUVRIR\n";
  txt+=`→ ${openAll.join(", ")}\n\n`;

  txt+="MODE 6 — TOUT FERMER\n";
  txt+=`→ ${closeAll.join(", ")}\n\n`;

  txt+="====================================\n\n";
  txt+="RÈGLE CRITIQUE\n";
  txt+="→ UN SEUL MODE ACTIF À LA FOIS\n";
  txt+="→ Variable globale Tuya : MODE\n\n";

  txt+="Valeurs possibles :\n";
  txt+="MANUEL / SEMAINE / WEEKEND / VACANCES\n\n";

  txt+="Toutes les automatisations doivent commencer par :\n";
  txt+="SI MODE = ...\n\n";

  txt+="====================================\n\n";
  txt+="BOUTONS CLIENT À CRÉER\n\n";
  txt+="• Mode Manuel\n";
  txt+="• Mode Semaine\n";
  txt+="• Mode Week-end\n";
  txt+="• Mode Vacances\n";
  txt+="• Tout Ouvrir\n";
  txt+="• Tout Fermer\n";

  document.getElementById("result").textContent=txt;
}
</script>

</body>
</html>
